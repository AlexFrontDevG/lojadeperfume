<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dior | ÉLIXIR</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="dior.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<header>

  <div class="logo">
    ÉLIXIR
  </div>

  <nav>

    <a href="index.html">Início</a>

    <a href="#products">Coleção</a>

  </nav>

 <div class="cart-button" onclick="openCart()">

🛒

<span class="cart-count">
0
</span>

</div>

</header>

<section class="hero">

  <div class="overlay">

    <span>COLLECTION</span>

    <h1>
      DIOR
    </h1>

    <p>
      Intensidade, presença e sofisticação em cada nota.
    </p>

  </div>

</section>

<section class="products-section" id="products">

  <div class="section-title">

    <span>DIOR</span>

    <h2>Fragrâncias Exclusivas</h2>

  </div>

  <div class="products-grid">

    <div class="product-card">

      <img src="https://dutyfreeceuta.com/image/cache/catalog/productos/1145054-1067x1024.jpg">

      <div class="product-info">

        <h3>Dior Sauvage</h3>

        <p class="price">
          R$ 850
        </p>

         <button onclick="addToCart(
'Dior Sauvage',
850,
'https://dutyfreeceuta.com/image/cache/catalog/productos/1145054-1067x1024.jpg'
)">
Adicionar ao Carrinho
</button>

      </div>

    </div>

    <div class="product-card">

      <img src="https://img.lojasrenner.com.br/item/599432466/original/12.jpg">

      <div class="product-info">

        <h3>Miss Dior</h3>

        <p class="price">
          R$ 930
        </p>

        <button onclick="addToCart(
'Miss Dior',
930,
'https://img.lojasrenner.com.br/item/599432466/original/12.jpg'
)">
Adicionar ao Carrinho
</button>
      </div>

    </div>

  </div>

</section>
<!-- OVERLAY -->

<div class="cart-overlay" id="cartOverlay"></div>

<!-- MINI CART -->

<div class="side-cart" id="sideCart">

    <div class="cart-header">

        <h2>Seu Carrinho</h2>

        <button onclick="closeCart()">
            ✕
        </button>

    </div>

    <div class="cart-items"></div>

    <div class="cart-footer">

        <h3>
            Total:
            <span class="cart-total">
                R$ 0
            </span>
        </h3>

        <a href="checkout.html">

            <button class="checkout-button">
                Finalizar Compra
            </button>

        </a>

    </div>

</div>

<!-- TOAST -->

<div class="toast" id="toast">

    <div class="toast-content">

        <span class="toast-icon">
            ✓
        </span>

        <div>

            <h4>
                Produto adicionado
            </h4>

            <p id="toastText">
                Perfume adicionado ao carrinho
            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
