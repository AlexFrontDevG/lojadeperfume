<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tom Ford | ÉLIXIR</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="tomford.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<!-- HEADER -->

<header>

  <div class="logo">
    ÉLIXIR
  </div>

  <nav>

    <a href="index.html">
      Início
    </a>

    <a href="#products">
      Coleção
    </a>

  </nav>

  <div class="cart-button" onclick="openCart()">

🛒

<span class="cart-count">
0
</span>

</div>

</header>

<!-- HERO -->

<section class="hero">

  <div class="overlay">

    <span>COLLECTION</span>

    <h1>
      TOM FORD
    </h1>

    <p>
      Luxo intenso, notas exóticas e sensualidade sofisticada.
    </p>

  </div>

</section>

<!-- PRODUTOS -->

<section class="products-section" id="products">

  <div class="section-title">

    <span>TOM FORD</span>

    <h2>Fragrâncias Exclusivas</h2>

  </div>

  <div class="products-grid">

    <!-- CARD -->

    <div class="product-card">

      <img src="https://shopluxo.vtexassets.com/arquivos/ids/225805/PERFUME-TOM-FORD-FUCKING-FABULOUS-MASCULINO-EAU-DE-PARFUM-100ml.jpg?v=637940267588330000">

      <div class="product-info">

        <h3> TOM FORD Fucking Fabulous</h3>

        <p class="price">
          R$ 2.390
        </p>

        <button onclick="addToCart(
'TOM FORD Fucking Fabulous',
2390,
'https://shopluxo.vtexassets.com/arquivos/ids/225805/PERFUME-TOM-FORD-FUCKING-FABULOUS-MASCULINO-EAU-DE-PARFUM-100ml.jpg?v=637940267588330000'
)">
Adicionar ao Carrinho
</button>

      </div>

    </div>

    <!-- CARD -->

    <div class="product-card">

      <img src="https://imgs.casasbahia.com.br/1531449735/1xg.jpg?imwidth=500">

      <div class="product-info">

        <h3>Tom Ford Noir</h3>

        <p class="price">
          R$ 2.043
        </p>

        <button onclick="addToCart(
'Tom Ford Noir',
1390,
'https://imgs.casasbahia.com.br/1531449735/1xg.jpg?imwidth=500'
)">
Adicionar ao Carrinho
</button>

      </div>

    </div>

  </div>

</section>
<!-- OVERLAY -->

<div class="cart-overlay" id="cartOverlay"></div>

<!-- MINI CART -->

<div class="side-cart" id="sideCart">

    <div class="cart-header">

        <h2>Seu Carrinho</h2>

        <button onclick="closeCart()">
            ✕
        </button>

    </div>

    <div class="cart-items"></div>

    <div class="cart-footer">

        <h3>
            Total:
            <span class="cart-total">
                R$ 0
            </span>
        </h3>

        <a href="checkout.html">

            <button class="checkout-button">
                Finalizar Compra
            </button>

        </a>

    </div>

</div>

<!-- TOAST -->

<div class="toast" id="toast">

    <div class="toast-content">

        <span class="toast-icon">
            ✓
        </span>

        <div>

            <h4>
                Produto adicionado
            </h4>

            <p id="toastText">
                Perfume adicionado ao carrinho
            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
